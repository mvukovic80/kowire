server:
  port: 8080

spring:
  application:
    name: mini-twitter-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:SPRING_DATA_MONGODB_PUBLIC_URI}
      username: ${MONGODB_USERNAME:SPRING_DATA_MONGODB_USERNAME}
      password: ${MONGODB_PASSWORD:SPRING_DATA_MONGODB_PASSWORD}

app:
  jwt:
    # In production, set JWT_SECRET as an environment variable (min 256-bit / 32+ char random string)
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-of-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.minitwitter: INFO
